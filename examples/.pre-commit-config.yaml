# Example pre-commit config for stackfix
# Copy this to your repo root as .pre-commit-config.yaml
repos:
  - repo: local
    hooks:
      - id: stackfix
        name: stackfix (AI-powered IaC repair)
        entry: stackfix pre-commit
        language: python
        additional_dependencies: ['stackfix']
        types_or: [terraform, yaml]
        # Only run on IaC-related files
        files: '\.(tf|yaml|yml)$'
